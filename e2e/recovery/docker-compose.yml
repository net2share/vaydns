networks:
  dns-net:
    ipam:
      config:
        - subnet: 172.28.0.0/24
  backend-net:

volumes:
  keys:

services:
  keygen:
    build:
      context: ../..
      dockerfile: Dockerfile
    volumes:
      - keys:/keys
    command: >
      sh -c "vaydns-server -gen-key -privkey-file /keys/server.key -pubkey-file /keys/server.pub"

  dns:
    image: coredns/coredns
    networks:
      dns-net:
        ipv4_address: 172.28.0.10
    volumes:
      - ../Corefile:/Corefile
    command: ["-conf", "/Corefile"]

  socks:
    image: serjs/go-socks5-proxy
    environment:
      - PROXY_USER=user
      - PROXY_PASSWORD=pass
    networks:
      - backend-net

  heavy:
    image: nginx:alpine
    networks:
      - backend-net
    entrypoint:
      - sh
      - -c
      - |
        dd if=/dev/urandom of=/usr/share/nginx/html/bigfile bs=1M count=10
        exec nginx -g 'daemon off;'

  server:
    build:
      context: ../..
      dockerfile: Dockerfile
    networks:
      dns-net:
        ipv4_address: 172.28.0.30
      backend-net:
    volumes:
      - keys:/keys
    command: >
      vaydns-server -udp :53 -privkey-file /keys/server.key
      -domain s.example.com -upstream socks:1080
      -idle-timeout 10s -keepalive 2s
    depends_on:
      keygen:
        condition: service_completed_successfully
      dns:
        condition: service_started
      socks:
        condition: service_started

  client:
    build:
      context: ../..
      dockerfile: Dockerfile
    networks:
      - dns-net
    volumes:
      - keys:/keys
    command: >
      vaydns-client -udp 172.28.0.10:53 -pubkey-file /keys/server.pub
      -domain s.example.com -listen 0.0.0.0:7000
      -idle-timeout 10s -keepalive 2s -session-check-interval 500ms
      -reconnect-min 1s -reconnect-max 5s
    depends_on:
      server:
        condition: service_started
